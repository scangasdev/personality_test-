services:
  - type: web
    name: apt-assessment-portal
    runtime: static
    buildCommand: "mkdir -p public && cp index.html styles.css app.js public/"
    staticPublishPath: ./public
    headers:
      - path: "/*"
        name: X-Frame-Options
        value: sameorigin
      - path: "/*"
        name: X-Content-Type-Options
        value: nosniff
      - path: "/*"
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
